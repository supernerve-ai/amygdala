name: Manual Pipeline Run

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level for the pipeline"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING
          - ERROR
      dry_run:
        description: "Dry run (skip output delivery)"
        required: false
        default: false
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Amygdala pipeline
        env:
          LOG_LEVEL: ${{ inputs.log_level }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "Running Amygdala with LOG_LEVEL=$LOG_LEVEL DRY_RUN=$DRY_RUN"
          python -m amygdala.main
